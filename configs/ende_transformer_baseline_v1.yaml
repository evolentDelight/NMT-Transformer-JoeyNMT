name: "ende_transformer_baseline_v1"
joeynmt_version: "2.3.0"
model_dir: "outputs/ende_transformer_baseline_v1"
use_cuda: true
fp16: false
random_seed: 42

data:
    train: "data/deu-eng-fixed/train"
    dev: "data/deu-eng-fixed/dev"
    test: "data/deu-eng-fixed/test"
    dataset_type: "plain"
    src:
        lang: "eng"
        level: "word"
        max_length: 100
        voc_limit: 40000
        voc_min_freq: 2
    trg:
        lang: "deu"
        level: "word"
        max_length: 100
        voc_limit: 40000
        voc_min_freq: 2
    special_symbols:
        unk_token: "<unk>"
        unk_id: 0
        pad_token: "<pad>"
        pad_id: 1
        bos_token: "<s>"
        bos_id: 2
        eos_token: "</s>"
        eos_id: 3

model:
    initializer: "xavier_uniform"
    embed_initializer: "xavier_uniform"
    embed_init_gain: 1.0
    init_gain: 1.0
    bias_initializer: "zeros"

    tied_embeddings: false
    tied_softmax: false

    encoder:
        type: "transformer"
        num_layers: 4
        num_heads: 4
        embeddings:
            embedding_dim: 256
            scale: true
            dropout: 0.1
        hidden_size: 256
        ff_size: 1024
        dropout: 0.2
        layer_norm: "pre"
        activation: "relu"

    decoder:
        type: "transformer"
        num_layers: 4
        num_heads: 4
        embeddings:
            embedding_dim: 256
            scale: true
            dropout: 0.1
        hidden_size: 256
        ff_size: 1024
        dropout: 0.2
        layer_norm: "pre"
        activation: "relu"

training:
    optimizer: "adam"
    learning_rate: 0.0005
    learning_rate_min: 1.0e-06
    weight_decay: 0.0
    clip_grad_norm: 1.0

    batch_size: 2048
    batch_type: "token"
    batch_multiplier: 1

    scheduling: "plateau"
    patience: 5
    decrease_factor: 0.7

    early_stopping_metric: "bleu"
    epochs: 20
    validation_freq: 1000
    logging_freq: 100

    shuffle: true
    print_valid_sents: [0, 1, 2]
    keep_best_ckpts: 3
    overwrite: false

testing:
    n_best: 1
    beam_size: 1
    beam_alpha: 1.0
    eval_metrics: ["bleu"]

    min_output_length: 1
    max_output_length: 100

    batch_size: 1000
    batch_type: "token"

    return_prob: "none"
    generate_unk: false

    sacrebleu_cfg:
        tokenize: "13a"
        lowercase: false