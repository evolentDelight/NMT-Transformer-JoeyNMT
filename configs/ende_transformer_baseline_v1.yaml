data:
    src: "eng"
    trg: "deu"

    train: "data/deu-eng/train"
    dev: "data/deu-eng/dev"
    test: "data/deu-eng/test1"

    level: "word"
    lowercase: false
    max_sent_length: 100

    src_vocab_max_size: 30000
    trg_vocab_max_size: 30000
    src_vocab_min_freq: 2
    trg_vocab_min_freq: 2

model:
    encoder:
        type: "transformer"
        num_layers: 4
        num_heads: 4
        hidden_size: 256
        ff_size: 1024
        dropout: 0.2
        embeddings:
            embedding_dim: 256
            dropout: 0.1

    decoder:
        type: "transformer"
        num_layers: 4
        num_heads: 4
        hidden_size: 256
        ff_size: 1024
        dropout: 0.2
        embeddings:
            embedding_dim: 256
            dropout: 0.1

    tied_embeddings: false
    tied_softmax: false